underscores_in_headers on;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream sub2api_backend {
    server sub2api-api:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name api.easyfun.one;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health {
        proxy_pass http://sub2api_backend;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.easyfun.one;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/api.easyfun.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.easyfun.one/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 256m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location = /health {
        proxy_pass http://sub2api_backend;
    }

    location /api/ {
        proxy_pass http://sub2api_backend;
    }

    location /setup/ {
        proxy_pass http://sub2api_backend;
    }

    location /v1/ {
        proxy_pass http://sub2api_backend;
    }

    location /v1beta/ {
        proxy_pass http://sub2api_backend;
    }

    location = /responses {
        proxy_pass http://sub2api_backend;
    }

    location /responses/ {
        proxy_pass http://sub2api_backend;
    }

    location /backend-api/ {
        proxy_pass http://sub2api_backend;
    }

    location /chat/ {
        proxy_pass http://sub2api_backend;
    }

    location = /embeddings {
        proxy_pass http://sub2api_backend;
    }

    location /images/ {
        proxy_pass http://sub2api_backend;
    }

    location /antigravity/ {
        proxy_pass http://sub2api_backend;
    }

    location ~ (^|/)\.(?!well-known/) {
        return 404;
    }

    location ~* ^/(Dockerfile|Procfile|serverless\.(yml|yaml)|firebase-debug\.log|aws/credentials|functions/\.runtimeconfig\.json|\.vscode/|\.svn/|\.hg/) {
        return 404;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
